name: pro_image_editor
description: "A Flutter image editor: Seamlessly enhance your images with user-friendly editing features."
version: 13.2.0
homepage: https://github.com/hm21/pro_image_editor/
repository: https://github.com/hm21/pro_image_editor/
documentation: https://github.com/hm21/pro_image_editor/
funding:
  - https://github.com/sponsors/hm21

topics:
  - image-editor
  - image
  - photo
  - picture
  - editor

screenshots:
  - description: "Showcase from the image editor with the frosted-glass design"
    path: assets/showcase-frosted-glass.jpg
  - description: "Showcase from the image editor with the WhatsApp design"
    path: assets/showcase-whatsapp.jpg
  - description: "Showcase from the image editor with simple design"
    path: assets/showcase.jpg

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  plugin_platform_interface: ^2.1.8
  shared_preferences: ^2.5.4
  vector_math: ^2.2.0
  web: ^1.1.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0
  mockito: ^5.6.3
  network_image_mock: ^2.1.1

flutter:
  plugin:
    platforms:
      android:
        package: ch.waio.pro_image_editor
        pluginClass: ProImageEditorPlugin
      ios:
        pluginClass: ProImageEditorPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: ProImageEditorPlugin
        sharedDarwinSource: true
  assets:
    - path: lib/web/web_worker.dart.js
      platforms: [web]
    - path: lib/web/web_worker.dart.js.map
      platforms: [web]
    - lib/designs/dagiga/assets/dagiga_color_ring.png
    - lib/designs/dagiga/assets/dagiga_color_close.svg
    - lib/designs/dagiga/assets/dagiga_color_eyedropper.svg
    - lib/designs/dagiga/assets/dagiga_tool_text.svg
    - lib/designs/dagiga/assets/dagiga_tool_sticker.svg
    - lib/designs/dagiga/assets/dagiga_tool_pen.svg
    - lib/designs/dagiga/assets/dagiga_menu_bold.svg
    - lib/designs/dagiga/assets/dagiga_menu_italic.svg
    - lib/designs/dagiga/assets/dagiga_menu_underline.svg
    - lib/designs/dagiga/assets/dagiga_menu_duplicate.svg
    - lib/designs/dagiga/assets/dagiga_menu_delete.svg
  shaders:
    - lib/shared/shaders/pixelate.frag
  fonts:
   - family: ProImageEditorIcons
     fonts:
      - asset: assets/fonts/ProImageEditorIcons.ttf