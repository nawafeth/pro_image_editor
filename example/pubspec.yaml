name: example
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  pro_image_editor:
    path: ../
    
  intl: ^0.20.1
  
  bot_toast: ^4.1.0
  cupertino_icons: ^1.0.8
  file_picker: 8.1.4
  gal: ^2.3.1
  google_fonts: ^6.2.1
  file_saver: ^0.2.14
  firebase_core: ^3.12.1
  firebase_storage: ^12.4.4
  supabase_flutter: ^2.8.1
  image_picker: ^1.1.2
  mime: ^2.0.0
  url_launcher: ^6.3.1
  flutter_colorpicker: ^1.1.0
  vibration: ^3.1.1

  pro_video_editor: ^0.0.6
  chewie: ^1.11.0
  video_player: ^2.9.3
  flick_video_player: ^0.9.0
  media_kit: ^1.1.11 # Primary package.
  media_kit_video: ^1.2.5 # For video rendering.
  media_kit_libs_video: ^1.0.5 # Native video dependencies.

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  import_sorter: ^4.6.0
  
dependency_overrides: 
  # Fix conflict with supabase
  mime: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo.png
    - assets/demo.mp4
    - assets/frame.png
    - assets/frame1.png
    - assets/google_fonts/